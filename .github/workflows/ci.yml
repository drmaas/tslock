name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && pnpm install
        env:
          CI: true
      - run: pnpm check
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
